services:
  runner:
    image: local/self-hosted-runner-mac:local
    build:
      context: .
      dockerfile: Dockerfile.mac
    platform: linux/arm64
    restart: always
    environment:
      REPO: ${REPO:?REPO is required}
      REG_TOKEN: ${REG_TOKEN:?REG_TOKEN is required}
      NAME: ${NAME:?NAME is required}
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
